<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Děkujeme za poptávku | Vojtovy Velké Klády</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .thanks {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-lg);
      text-align: center;
    }
    .thanks__card {
      max-width: 34rem;
    }
    .thanks__badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 4.5rem;
      height: 4.5rem;
      border-radius: 50%;
      background: var(--oak);
      color: var(--paper);
      margin-bottom: var(--space-md);
    }
    .thanks__badge svg { width: 2.25rem; height: 2.25rem; }
    .thanks h1 {
      font-family: var(--font-serif);
      font-weight: 500;
      font-size: clamp(2rem, 5vw, 3rem);
      color: var(--ink);
      margin-bottom: var(--space-sm);
    }
    .thanks p {
      font-family: var(--font-sans);
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.6;
      margin-bottom: var(--space-lg);
    }
  </style>
</head>
<body>
  <main class="thanks">
    <div class="thanks__card">
      <span class="thanks__badge" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M20 6L9 17l-5-5"/></svg>
      </span>
      <h1>Děkujeme za poptávku</h1>
      <p>Poptávku i s fotkami máme. Ozveme se vám do dvou pracovních dnů.</p>
      <a class="btn btn-primary" href="/">Zpět na web</a>
    </div>
  </main>
</body>
</html>
